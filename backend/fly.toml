# fly.toml app configuration file generated for backend-summer-shadow-5577 on 2026-07-10T22:52:01-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-summer-shadow-5577'
primary_region = 'gru'

[build]
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "whatsapp_data"
  destination = "/app/whatsapp-session"
